schema: paperclip/v1

company:
  name: company-os
  mission: >
    A generic, forkable AI company operating system built on Paperclip + gstack.
    Replace this mission with your own. Every agent, skill, and memory path
    works out of the box — customize agent context for your domain.
  version: 1.0.0
  template: true  # mark as a forkable template

# ─── Agent Org Chart ──────────────────────────────────────────────────────────
#
#   Chief of Staff (opus-4.6)
#   ├── Product Manager       → discover, plan, evaluate
#   ├── Research Analyst      → x-research, last30days, synthesize
#   ├── CTO                   → architecture, codex, health
#   │   ├── Frontend Engineer → UI, design system
#   │   ├── Backend Engineer  → API, data, implementation
#   │   └── Release Engineer  → git, ship, deploy
#   ├── QA Engineer           → test, benchmark, canary
#   ├── Design Consultant     → brand, design system, visual
#   ├── Security Officer      → CSO, guardrails
#   └── Content Writer        → copy, policy, docs
#
# ─────────────────────────────────────────────────────────────────────────────

agents:
  chief-of-staff:
    model: claude-opus-4-6
    description: Strategic direction, scope decisions, 10-star product thinking
    skills:
      - plan-ceo-review
      - office-hours
      - plan-strategy
      - frame-problem
      - write-brief
      - evaluating
      - brainstorming
    memory:
      claude_mem: true
      max_context_tokens: 500    # strategy context — keep focused
      inject_on_heartbeat: true

  product-manager:
    model: claude-sonnet-4-6
    description: Product discovery, 0-to-1, PRDs, jobs-to-be-done
    skills:
      - discover-product
      - brainstorming
      - writing-plans
      - synthesize-research
      - evaluating
      - frame-problem
    memory:
      claude_mem: true
      max_context_tokens: 600    # product context: user research, specs
      inject_on_heartbeat: true

  research-analyst:
    model: claude-sonnet-4-6
    description: Research, competitive intelligence, synthesis
    skills:
      - x-research
      - last30days-nux
      - researching-web
      - researching-codebase
      - synthesize-research
      - writing-documentation
    memory:
      claude_mem: true
      max_context_tokens: 800    # research history is high-value context
      inject_on_heartbeat: true

  cto:
    model: claude-opus-4-6
    description: Technical architecture, code quality, cross-team technical decisions
    skills:
      - plan-eng-review
      - codex
      - health
      - investigate
      - review
      - devex-review
      - cso
    memory:
      claude_mem: true
      max_context_tokens: 800    # architecture decisions, code patterns
      inject_on_heartbeat: true

  frontend-engineer:
    model: claude-sonnet-4-6
    description: UI components, pages, design system enforcement
    skills:
      - frontend-design
      - design-html
      - design-review
      - design-shotgun
      - qa
      - benchmark
    memory:
      claude_mem: true
      max_context_tokens: 700    # component patterns, DESIGN.md context
      inject_on_heartbeat: true

  backend-engineer:
    model: claude-sonnet-4-6
    description: APIs, data models, business logic, integrations
    skills:
      - implementing
      - investigate
      - health
      - careful
      - writing-plans
      - researching-codebase
    memory:
      claude_mem: true
      max_context_tokens: 800    # engineers benefit from more code context
      inject_on_heartbeat: true

  release-engineer:
    model: claude-sonnet-4-6
    description: Git workflow, versioning, deploys, PR management
    skills:
      - ship
      - land-and-deploy
      - github
      - review
      - document-release
      - retro
      - checkpoint
    memory:
      claude_mem: true
      max_context_tokens: 400    # deploy history, branch state
      inject_on_heartbeat: true
    inputs:
      env:
        GH_TOKEN:
          kind: secret
          requirement: optional

  qa-engineer:
    model: claude-sonnet-4-6
    description: Browser testing, visual QA, performance, post-deploy monitoring
    skills:
      - qa
      - qa-only
      - benchmark
      - canary
      - browse
      - setup-browser-cookies
      - design-review
    memory:
      claude_mem: true
      max_context_tokens: 500    # test patterns, known failure modes
      inject_on_heartbeat: true

  design-consultant:
    model: claude-sonnet-4-6
    description: Design system, brand identity, visual direction
    skills:
      - design-consultation
      - design-review
      - design-shotgun
      - design-html
      - brand-voice-enforcement
      - plan-design-review
    memory:
      claude_mem: true
      max_context_tokens: 600    # design decisions, brand history
      inject_on_heartbeat: true

  security-officer:
    model: claude-sonnet-4-6
    description: Security audits, guardrails, threat modeling
    skills:
      - cso
      - guard
      - careful
      - freeze
      - review
    memory:
      claude_mem: true
      max_context_tokens: 500    # threat model, prior findings
      inject_on_heartbeat: true

  content-writer:
    model: claude-sonnet-4-6
    description: Copy, policy docs, SOPs, brand voice
    skills:
      - brand-voice-enforcement
      - write-policy
      - write-brief
      - writing-documentation
      - evaluating
    memory:
      claude_mem: true
      max_context_tokens: 400    # brand voice patterns, tone decisions
      inject_on_heartbeat: true

  solo-founder:
    model: claude-opus-4-6
    description: >
      The founder's co-pilot. Handles the business-building layer that product and
      engineering skills don't cover: customer discovery, PMF measurement, fundraising,
      financial modeling, legal scaffolding, hiring, growth, and the weekly/monthly
      operating cadence. Primary agent for the 0-to-1 journey.
    skills:
      # Tier 1 — Critical (Month 1-3)
      - user-interview
      - pmf-pulse
      - pitch-deck
      - investor-update
      - runway
      # Tier 2 — Growth (Month 3-9)
      - launch-strategy
      - sales-playbook
      - pricing-strategy
      - growth-experiment
      - legal-basics
      # Tier 3 — Scale (Month 6-18)
      - cap-table
      - first-hire
      - content-machine
      - demo-script
      - decision-journal
      - founder-rhythm
      # Cross-functional (from other agents)
      - write-brief
      - brainstorming
      - frame-problem
      - synthesize-research
      - x-research
      - last30days-nux
    memory:
      claude_mem: true
      max_context_tokens: 1000   # founder context is high-value — more budget
      inject_on_heartbeat: true
    skills_path: ./skills          # local skills directory (relative to repo root)

teams:
  product:
    lead: chief-of-staff
    members:
      - product-manager
      - research-analyst

  engineering:
    lead: cto
    members:
      - frontend-engineer
      - backend-engineer
      - release-engineer
      - qa-engineer

  creative:
    lead: design-consultant
    members:
      - content-writer
      - frontend-engineer
